// Parse data
const parsed = {};
const chargeTotals = {};
let curDate = null;

rawData.split('\n').forEach(line => {
  line = line.trim();
  if (!line) return;
  const dm = line.match(/^Date:\s*([\d-]+)/);
  if (dm) { curDate = dm[1]; parsed[curDate] = []; return; }
  if (line.includes('Currency:')) return;
  const cm = line.match(/\[charge\] total num:\s*(\d+)/);
  if (cm) { chargeTotals[curDate] = parseInt(cm[1]); return; }
  const pm = line.match(/^(\S+):\s*(\d+)(?:\/([\d.]+))?/);
  if (pm && curDate) {
    parsed[curDate].push({
      name: pm[1],
      num: parseInt(pm[2]),
      rate: pm[3] ? parseFloat(pm[3]) : null
    });
  }
});

const dates = Object.keys(parsed).sort();
const labels = dates.map(d => d.slice(5)); // "03-02"

// Collect all providers & their data
const allProviders = {};
dates.forEach(d => {
  parsed[d].forEach(p => {
    if (!allProviders[p.name]) allProviders[p.name] = {};
    allProviders[p.name][d] = { num: p.num, rate: p.rate };
  });
});

// Avg daily volume for sizing
const providerAvgVol = {};
Object.entries(allProviders).forEach(([name, dayData]) => {
  const nums = Object.values(dayData).map(v => v.num);
  providerAvgVol[name] = nums.reduce((a, b) => a + b, 0) / nums.length;
});

// Color palette
const colors = {
  'PixU2cpay': '#60a5fa',
  'PixGogo2pay': '#34d399',
  'PixUnivepay': '#a78bfa',
  'PixBestpay': '#f472b6',
  'Pix4zpay': '#fbbf24',
  'PixTransafepay': '#fb923c',
  'PixNewCbpay': '#f87171',
  'PixBcpay': '#e879f9',
  'PixSqpay': '#22d3ee',
  'PixWodipay': '#94a3b8',
  'PixGlobalpay': '#2dd4bf',
  'PixNewwinpay': '#818cf8',
  'PixNewcashpay': '#c084fc',
  'PixSitobankpay': '#4ade80',
  'PixWaterpay': '#38bdf8',
  'PixUupay': '#fb7185',
  'PixWanlihuipay': '#d946ef',
  'PixUaupay': '#a3e635',
  'PixCepay': '#fca5a5',
  'PixEpay2': '#7dd3fc',
};

function getColor(name) {
  return colors[name] || `hsl(${(name.split('').reduce((h,c) => h + c.charCodeAt(0), 0) * 137) % 360}, 65%, 60%)`;
}

// Groups
const groups = {
  top5: ['PixU2cpay', 'PixGogo2pay', 'PixUnivepay', 'PixBestpay', 'Pix4zpay'],
  mid: ['PixTransafepay', 'PixNewCbpay', 'PixBcpay', 'PixSqpay', 'PixSitobankpay', 'PixNewcashpay', 'PixWodipay'],
  small: ['PixGlobalpay', 'PixNewwinpay', 'PixUupay', 'PixWaterpay', 'PixWanlihuipay', 'PixUaupay', 'PixCepay', 'PixEpay2'],
  problem: ['PixNewCbpay', 'PixBcpay', 'PixTransafepay', 'PixBestpay', 'Pix4zpay'],
  all: Object.keys(allProviders).filter(n => providerAvgVol[n] > 50)
};

let mainChart, volumeChart;
let currentGroup = 'all';
let hiddenDatasets = new Set();

function buildDatasets(group) {
  const providerNames = groups[group] || groups.top5;
  return providerNames.map(name => {
    const pData = allProviders[name] || {};
    return {
      label: name,
      data: dates.map(d => pData[d]?.rate ?? null),
      borderColor: getColor(name),
      backgroundColor: getColor(name) + '18',
      borderWidth: group === 'all' ? 1.5 : 2.5,
      pointRadius: group === 'all' ? 2 : 4,
      pointHoverRadius: 7,
      pointBackgroundColor: getColor(name),
      pointBorderColor: '#111827',
      pointBorderWidth: 2,
      tension: 0.3,
      spanGaps: false,
      hidden: hiddenDatasets.has(name),
    };
  });
}

function createMainChart(group) {
  const ctx = document.getElementById('mainChart').getContext('2d');
  if (mainChart) mainChart.destroy();

  mainChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: buildDatasets(group) },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e293b',
          titleColor: '#e2e8f0',
          bodyColor: '#94a3b8',
          borderColor: '#334155',
          borderWidth: 1,
          padding: 12,
          cornerRadius: 8,
          titleFont: { size: 13, weight: 600 },
          bodyFont: { size: 12 },
          callbacks: {
            label: ctx => {
              if (ctx.raw === null) return null;
              const pData = allProviders[ctx.dataset.label]?.[dates[ctx.dataIndex]];
              const vol = pData ? pData.num.toLocaleString() : '-';
              return `${ctx.dataset.label}: ${ctx.raw}%  (${vol}笔)`;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: '#1e293b' },
          ticks: { color: '#64748b', font: { size: 11 } }
        },
        y: {
          grid: { color: '#1e293b' },
          ticks: { color: '#64748b', font: { size: 11 }, callback: v => v + '%' },
          min: group === 'small' ? 40 : group === 'problem' ? 55 : 60,
          max: 100
        }
      }
    }
  });

  buildLegend(group);
}

function buildLegend(group) {
  const container = document.getElementById('customLegend');
  const providerNames = groups[group] || groups.top5;
  container.innerHTML = providerNames.map(name => {
    const isHidden = hiddenDatasets.has(name);
    return `<div class="legend-item ${isHidden ? 'hidden' : ''}" onclick="toggleProvider('${name}')">
      <span class="legend-dot" style="background:${getColor(name)}"></span>
      <span class="legend-name">${name.replace('Pix','').replace('pay','')}</span>
    </div>`;
  }).join('');
}

function toggleProvider(name) {
  if (hiddenDatasets.has(name)) {
    hiddenDatasets.delete(name);
  } else {
    hiddenDatasets.add(name);
  }
  const idx = mainChart.data.datasets.findIndex(ds => ds.label === name);
  if (idx >= 0) {
    mainChart.data.datasets[idx].hidden = hiddenDatasets.has(name);
    mainChart.update();
  }
  buildLegend(currentGroup);
  // In 'all' mode, also update stats to match visible providers
  if (currentGroup === 'all') {
    updateStats(currentGroup);
  }
}

function createVolumeChart() {
  const ctx = document.getElementById('volumeChart').getContext('2d');
  if (volumeChart) volumeChart.destroy();

  const volumes = dates.map(d => chargeTotals[d] || 0);
  const avgVol = volumes.reduce((a, b) => a + b, 0) / volumes.length;

  volumeChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: '充值笔数',
        data: volumes,
        backgroundColor: volumes.map(v => v > avgVol
          ? 'rgba(96, 165, 250, 0.5)'
          : 'rgba(96, 165, 250, 0.25)'),
        borderColor: 'rgba(96, 165, 250, 0.8)',
        borderWidth: 1,
        borderRadius: 4,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e293b',
          titleColor: '#e2e8f0',
          bodyColor: '#94a3b8',
          borderColor: '#334155',
          borderWidth: 1,
          padding: 12,
          cornerRadius: 8,
          callbacks: {
            label: ctx => `充值: ${ctx.raw.toLocaleString()} 笔`
          }
        }
      },
      scales: {
        x: { grid: { color: '#1e293b' }, ticks: { color: '#64748b', font: { size: 11 } } },
        y: {
          grid: { color: '#1e293b' },
          ticks: {
            color: '#64748b',
            font: { size: 11 },
            callback: v => (v / 10000).toFixed(0) + '万'
          }
        }
      }
    }
  });
}

function showGroup(group) {
  currentGroup = group;
  hiddenDatasets.clear();
  // Show/hide the toggle radios
  const radios = document.getElementById('allToggleRadios');
  if (group === 'all') {
    radios.classList.add('visible');
    // Check which radio is selected
    const selected = document.querySelector('input[name="allToggle"]:checked').value;
    if (selected === 'hide') {
      groups.all.forEach(n => hiddenDatasets.add(n));
    }
  } else {
    radios.classList.remove('visible');
  }
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  createMainChart(group);
  updateStats(group);
}

function toggleAll(mode) {
  if (currentGroup !== 'all') return;
  hiddenDatasets.clear();
  if (mode === 'hide') {
    groups.all.forEach(n => hiddenDatasets.add(n));
  }
  createMainChart('all');
  updateStats('all');
}

function updateStats(group) {
  let providerNames = groups[group] || groups.top5;
  const container = document.getElementById('statsContainer');
  // In 'all' mode, only show stats for visible (non-hidden) providers
  if (group === 'all') {
    providerNames = providerNames.filter(n => !hiddenDatasets.has(n));
    if (!providerNames.length) {
      container.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:#64748b;font-size:13px;padding:16px;">👆 点击上方 Provider 图例激活曲线并查看统计卡片</div>';
      return;
    }
  }
  container.innerHTML = providerNames.map(name => {
    const pData = allProviders[name] || {};
    const ratesArr = Object.entries(pData)
      .filter(([_, v]) => v.rate !== null)
      .map(([d, v]) => ({ date: d, rate: v.rate, num: v.num }));
    if (!ratesArr.length) return '';

    const avg = (ratesArr.reduce((s, r) => s + r.rate, 0) / ratesArr.length).toFixed(2);
    const min = ratesArr.reduce((m, r) => r.rate < m.rate ? r : m);
    const max = ratesArr.reduce((m, r) => r.rate > m.rate ? r : m);
    const diff = (max.rate - min.rate).toFixed(2);
    
    // Trend: compare first 10 days avg vs last 10 days avg
    const first10 = ratesArr.filter(r => r.date <= '2026-03-11');
    const last10 = ratesArr.filter(r => r.date >= '2026-03-23');
    const f10avg = first10.length ? first10.reduce((s,r) => s + r.rate, 0) / first10.length : 0;
    const l10avg = last10.length ? last10.reduce((s,r) => s + r.rate, 0) / last10.length : 0;
    const trendDiff = (l10avg - f10avg).toFixed(2);
    const trendClass = trendDiff < -2 ? 'trend-down' : trendDiff > 2 ? 'trend-up' : 'trend-flat';
    const trendIcon = trendDiff < -2 ? '↓' : trendDiff > 2 ? '↑' : '→';

    return `<div class="stat-card">
      <div class="name" style="color:${getColor(name)}">${name}</div>
      <div class="value" style="color:${getColor(name)}">${avg}%</div>
      <div class="sub">波动: ${diff}% | 最低 ${min.rate}% (${min.date.slice(5)})</div>
      <div class="sub ${trendClass}">趋势: ${trendIcon} ${trendDiff}% (上旬→下旬)</div>
    </div>`;
  }).join('');
}

// Init - 'all' mode, default “全部展示” (all curves visible)
createMainChart('all');
createVolumeChart();
updateStats('all');
</script>
